<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pipeline C2 2026 — La Positiva Seguros</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --brand:#E85F1E;--brand2:#1E4FA3;
  --bg:#F4F5F7;--surface:#FFFFFF;--surface2:#F9FAFB;
  --border:#E2E5EA;--border2:#CBD0D8;
  --text:#1A2335;--text2:#4A5568;--text3:#8A9BB0;
  --green:#0A7C55;--green-bg:#E8F7F2;
  --blue:#1563BB;--blue-bg:#EAF1FC;
  --amber:#B05800;--amber-bg:#FEF3E5;
  --red:#C0392B;--red-bg:#FDECEB;
  --gray:#6B7A8D;--gray-bg:#EEF0F4;
  --radius:10px;--radius-lg:16px;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 4px 12px rgba(0,0,0,.05);
  --shadow-lg:0 4px 20px rgba(0,0,0,.1);
  font-family:'DM Sans',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}
.topbar{background:var(--surface);border-bottom:1.5px solid var(--border);padding:0 28px;display:flex;align-items:center;justify-content:space-between;height:58px;position:sticky;top:0;z-index:200}
.topbar-left{display:flex;align-items:center;gap:14px}
.logo{width:32px;height:32px;background:var(--brand);border-radius:8px;display:flex;align-items:center;justify-content:center}
.logo svg{width:18px;height:18px;fill:#fff}
.topbar-right{display:flex;align-items:center;gap:8px}
.btn{font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;padding:6px 14px;border-radius:7px;border:1.5px solid var(--border2);background:var(--surface);color:var(--text2);cursor:pointer;transition:.15s;display:flex;align-items:center;gap:5px}
.btn:hover{background:var(--surface2);border-color:var(--brand);color:var(--brand)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-primary{background:var(--brand);color:#fff;border-color:var(--brand)}
.btn-primary:hover{background:#cc4e12;border-color:#cc4e12;color:#fff}
.nav{background:var(--surface);border-bottom:1.5px solid var(--border);padding:0 28px;display:flex;gap:4px}
.nav-tab{font-size:13px;font-weight:500;padding:10px 16px;border-bottom:2.5px solid transparent;color:var(--text3);cursor:pointer;transition:.15s;user-select:none}
.nav-tab.active{color:var(--brand);border-bottom-color:var(--brand)}
.nav-tab:hover:not(.active){color:var(--text2)}
.main{padding:20px 28px;max-width:1400px;margin:0 auto}
.metrics{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:20px}
.metric{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-lg);padding:16px 18px;box-shadow:var(--shadow)}
.metric-val{font-size:26px;font-weight:600;line-height:1;margin-bottom:4px}
.metric-lbl{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;font-weight:500}
.metric-sub{font-size:11px;color:var(--text3);margin-top:3px}
.metric-bar{height:4px;background:var(--border);border-radius:2px;margin-top:10px;overflow:hidden}
.metric-bar-fill{height:100%;border-radius:2px;transition:width .5s}
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.sec-hdr h2{font-size:13px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.06em}
.kanban{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:28px}
.col{background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;min-height:160px}
.col-hdr{padding:12px 14px 10px;display:flex;align-items:center;justify-content:space-between;border-bottom:1.5px solid var(--border)}
.col-hdr-title{font-size:12px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;display:flex;align-items:center;gap:7px}
.col-hdr-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.col-badge{font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px}
.col-body{padding:8px;display:flex;flex-direction:column;gap:6px;min-height:80px}
.card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:10px 12px;cursor:pointer;transition:.15s;position:relative}
.card:hover{border-color:var(--brand);box-shadow:var(--shadow)}
.card-proj{font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;display:inline-flex;align-items:center;gap:4px;margin-bottom:5px}
.card-proj-dot{width:6px;height:6px;border-radius:50%}
.card-name{font-size:12px;font-weight:500;color:var(--text);line-height:1.35;margin-bottom:4px}
.card-dates{font-size:11px;color:var(--text3);margin-bottom:3px}
.card-weight{font-size:10px;font-weight:600;color:var(--text3)}
.card-prog{margin-top:6px;height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.card-prog-fill{height:100%;border-radius:2px;transition:width .4s}
.empty-col{padding:20px 10px;text-align:center;font-size:11px;color:var(--text3)}
.gantt-wrap{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:28px;box-shadow:var(--shadow)}
.gantt-inner{overflow-x:auto}
.gantt-table{width:100%;border-collapse:collapse;min-width:900px}
.gantt-table th{background:var(--surface2);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--text3);padding:8px 12px;border-bottom:1.5px solid var(--border);text-align:left;white-space:nowrap}
.gantt-table td{padding:7px 10px;border-bottom:1px solid var(--border);vertical-align:middle}
.gantt-table tr:last-child td{border-bottom:none}
.gantt-table tr:hover td{background:var(--surface2)}
.gname{font-size:12px;font-weight:500;color:var(--text);max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.gtrack{width:100%;min-width:320px;height:16px;background:var(--border);border-radius:4px;position:relative;overflow:visible}
.gbar{position:absolute;height:100%;border-radius:4px;top:0;transition:.4s}
.gpct{font-size:11px;font-weight:600;color:var(--text2);text-align:right;width:36px}
.gstatus-pill{font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;white-space:nowrap}
.charts-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:28px}
.chart-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-lg);padding:18px;box-shadow:var(--shadow)}
.chart-card-wide{grid-column:span 2}
.chart-title{font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:14px}
.chart-canvas-wrap{position:relative;height:200px}
.proj-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:12px;margin-bottom:28px}
.proj-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-lg);padding:16px 18px;box-shadow:var(--shadow)}
.proj-card-hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px}
.proj-name{font-size:13px;font-weight:600;color:var(--text)}
.proj-pct{font-size:20px;font-weight:700}
.proj-bar-wrap{height:6px;background:var(--border);border-radius:3px;overflow:hidden;margin-bottom:10px}
.proj-bar-fill{height:100%;border-radius:3px;transition:width .5s}
.proj-stats{display:flex;gap:8px;flex-wrap:wrap}
.proj-stat{font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px}
.proj-hitos{margin-top:10px;display:flex;flex-direction:column;gap:3px}
.proj-hito-row{display:flex;align-items:center;justify-content:space-between;font-size:11px;padding:3px 0;border-bottom:1px solid var(--border);cursor:pointer}
.proj-hito-row:last-child{border-bottom:none}
.proj-hito-row:hover{color:var(--brand)}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(15,25,50,.45);z-index:1000;align-items:center;justify-content:center;backdrop-filter:blur(2px)}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border-radius:var(--radius-lg);border:1.5px solid var(--border);width:480px;max-height:85vh;overflow-y:auto;box-shadow:var(--shadow-lg)}
.modal-hdr{padding:18px 20px 14px;border-bottom:1.5px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between}
.modal-title{font-size:14px;font-weight:600;color:var(--text)}
.modal-subtitle{font-size:11px;color:var(--text3);margin-top:2px}
.modal-close{font-size:18px;color:var(--text3);background:none;border:none;cursor:pointer;line-height:1;padding:2px 4px}
.modal-close:hover{color:var(--text)}
.modal-body{padding:18px 20px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.form-row.full{grid-template-columns:1fr}
.form-group{display:flex;flex-direction:column;gap:4px}
.form-group label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.04em}
.form-group input,.form-group select,.form-group textarea{font-family:'DM Sans',sans-serif;font-size:13px;padding:7px 10px;border:1.5px solid var(--border2);border-radius:7px;color:var(--text);background:var(--surface);transition:.15s;outline:none}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(232,95,30,.12)}
.form-group textarea{resize:vertical;min-height:60px}
.modal-ftr{padding:12px 20px 16px;border-top:1.5px solid var(--border);display:flex;justify-content:flex-end;gap:8px}
.toast{position:fixed;bottom:24px;right:24px;background:var(--text);color:#fff;font-size:12px;font-weight:500;padding:10px 16px;border-radius:8px;z-index:2000;transform:translateY(60px);opacity:0;transition:.3s;pointer-events:none}
.toast.show{transform:translateY(0);opacity:1}
.toast.error{background:var(--red)}
.filters{display:flex;gap:8px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
.filters select,.filters input{font-family:'DM Sans',sans-serif;font-size:12px;height:32px;padding:0 10px;border:1.5px solid var(--border2);border-radius:7px;background:var(--surface);color:var(--text);outline:none}
.filters select:focus,.filters input:focus{border-color:var(--brand)}
.filter-lbl{font-size:11px;color:var(--text3);font-weight:500}
.month-prog-wrap{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-lg);padding:16px 18px;margin-bottom:20px;box-shadow:var(--shadow)}
.month-prog-title{font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px}
.month-prog-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.month-cell{border:1.5px solid var(--border);border-radius:var(--radius);padding:12px 14px}
.month-cell-name{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
.month-cell-pct{font-size:20px;font-weight:700;color:var(--text);margin-bottom:4px}
.month-cell-bar{height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.month-cell-fill{height:100%;border-radius:2px;transition:width .5s}
.month-input{font-family:'DM Sans',sans-serif;font-size:12px;width:60px;padding:3px 6px;border:1.5px solid var(--border2);border-radius:5px;text-align:center;color:var(--text)}
.loading-overlay{position:fixed;inset:0;background:rgba(255,255,255,.85);z-index:3000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px}
.loading-spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--brand);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:13px;color:var(--text3);font-weight:500}
.sync-dot{width:8px;height:8px;border-radius:50%;background:var(--green);display:inline-block;margin-right:5px}
.sync-dot.syncing{background:var(--amber);animation:pulse .8s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.hidden{display:none!important}
.view-section{animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<div class="loading-overlay" id="loading-overlay">
  <div class="loading-spinner"></div>
  <div class="loading-text">Cargando datos del equipo...</div>
</div>

<div class="topbar">
  <div class="topbar-left">
    <div class="logo"><svg viewBox="0 0 24 24"><path d="M12 2L2 7v10l10 5 10-5V7L12 2zm0 2.5l7.5 3.75-7.5 3.75L4.5 8.25 12 4.5zm-8.5 5.2l8.5 4.25v7.55L3.5 17.25V9.7zm10 11.8v-7.55l8.5-4.25v7.55L13.5 21.5z"/></svg></div>
    <div>
      <div style="font-size:15px;font-weight:600;color:var(--text)">Pipeline C2 2026</div>
      <div style="font-size:11px;color:var(--text3);letter-spacing:.03em">
        <span class="sync-dot" id="sync-dot"></span>
        <span id="sync-label">Innovación &amp; Tecnología · La Positiva Seguros</span>
      </div>
    </div>
  </div>
  <div class="topbar-right">
    <button class="btn" onclick="openAddProject()">＋ Proyecto</button>
    <button class="btn btn-primary" onclick="openAddHito()">＋ Hito</button>
  </div>
</div>

<div class="nav">
  <div class="nav-tab active" onclick="setView('pipeline',this)">Pipeline</div>
  <div class="nav-tab" onclick="setView('gantt',this)">Cronograma</div>
  <div class="nav-tab" onclick="setView('graficos',this)">Gráficos</div>
  <div class="nav-tab" onclick="setView('proyectos',this)">Por Proyecto</div>
</div>

<div class="main">
  <div class="metrics" id="metrics"></div>
  <div class="month-prog-wrap" id="month-prog-section">
    <div class="month-prog-title">Avance mensual estimado del equipo (%)</div>
    <div class="month-prog-grid" id="month-prog-grid"></div>
  </div>
  <div class="filters">
    <span class="filter-lbl">Proyecto:</span>
    <select id="filt-proj" onchange="renderCurrentView()"><option value="all">Todos</option></select>
    <span class="filter-lbl">Estado:</span>
    <select id="filt-status" onchange="renderCurrentView()">
      <option value="all">Todos</option>
      <option>No Iniciado</option><option>En Progreso</option>
      <option>Bloqueado</option><option>Completado</option>
    </select>
    <input type="text" id="filt-search" placeholder="Buscar hito..." oninput="renderCurrentView()" style="width:180px">
  </div>
  <div id="view-pipeline" class="view-section"></div>
  <div id="view-gantt" class="view-section hidden"></div>
  <div id="view-graficos" class="view-section hidden"></div>
  <div id="view-proyectos" class="view-section hidden"></div>
</div>

<!-- MODAL EDITAR HITO -->
<div class="modal-overlay" id="modal-hito-overlay" onclick="closeModalHito(event)">
  <div class="modal">
    <div class="modal-hdr">
      <div><div class="modal-title" id="mh-title">Editar hito</div><div class="modal-subtitle" id="mh-proj-label"></div></div>
      <button class="modal-close" onclick="closeModalHito()">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="mh-id">
      <div class="form-row full"><div class="form-group"><label>Nombre del hito</label><input id="mh-name" type="text"></div></div>
      <div class="form-row">
        <div class="form-group"><label>Fecha inicio</label><input id="mh-ini" type="date"></div>
        <div class="form-group"><label>Fecha fin</label><input id="mh-fin" type="date"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Estado</label>
          <select id="mh-status">
            <option>No Iniciado</option><option>En Progreso</option>
            <option>Bloqueado</option><option>Completado</option>
          </select>
        </div>
        <div class="form-group"><label>Peso % en proyecto</label><input id="mh-weight" type="number" min="0" max="100"></div>
      </div>
      <div class="form-row full"><div class="form-group"><label>% Avance (0–100)</label><input id="mh-pct" type="number" min="0" max="100"></div></div>
      <div class="form-row full"><div class="form-group"><label>Notas</label><textarea id="mh-notes" rows="2"></textarea></div></div>
    </div>
    <div class="modal-ftr">
      <button class="btn" id="mh-delete-btn" onclick="deleteHito()" style="color:var(--red);border-color:var(--red)">Eliminar</button>
      <button class="btn" onclick="closeModalHito()">Cancelar</button>
      <button class="btn btn-primary" id="mh-save-btn" onclick="saveHito()">Guardar</button>
    </div>
  </div>
</div>

<!-- MODAL AGREGAR HITO -->
<div class="modal-overlay" id="modal-add-hito-overlay" onclick="e=>e.target===document.getElementById('modal-add-hito-overlay')&&closeAddHito()">
  <div class="modal">
    <div class="modal-hdr">
      <div><div class="modal-title">Nuevo hito</div></div>
      <button class="modal-close" onclick="closeAddHito()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-row full"><div class="form-group"><label>Proyecto</label><select id="ah-proj"></select></div></div>
      <div class="form-row full"><div class="form-group"><label>Nombre del hito</label><input id="ah-name" type="text"></div></div>
      <div class="form-row">
        <div class="form-group"><label>Fecha inicio</label><input id="ah-ini" type="date" value="2026-05-04"></div>
        <div class="form-group"><label>Fecha fin</label><input id="ah-fin" type="date" value="2026-08-31"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Estado</label>
          <select id="ah-status"><option>No Iniciado</option><option>En Progreso</option><option>Bloqueado</option><option>Completado</option></select>
        </div>
        <div class="form-group"><label>Peso %</label><input id="ah-weight" type="number" min="0" max="100" value="10"></div>
      </div>
    </div>
    <div class="modal-ftr">
      <button class="btn" onclick="closeAddHito()">Cancelar</button>
      <button class="btn btn-primary" id="ah-save-btn" onclick="saveAddHito()">Agregar</button>
    </div>
  </div>
</div>

<!-- MODAL AGREGAR PROYECTO -->
<div class="modal-overlay" id="modal-add-proj-overlay" onclick="e=>e.target===document.getElementById('modal-add-proj-overlay')&&closeAddProject()">
  <div class="modal">
    <div class="modal-hdr">
      <div><div class="modal-title">Nuevo proyecto</div></div>
      <button class="modal-close" onclick="closeAddProject()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-row full"><div class="form-group"><label>Nombre del proyecto</label><input id="ap-name" type="text" placeholder="Ej: Automatización de Suscripción"></div></div>
      <div class="form-row">
        <div class="form-group"><label>Color</label><input id="ap-color" type="color" value="#1E6FBF" style="height:36px;padding:2px 4px;width:100%"></div>
        <div class="form-group"><label>ID (sin espacios)</label><input id="ap-id" type="text" placeholder="ej: auto_susc"></div>
      </div>
    </div>
    <div class="modal-ftr">
      <button class="btn" onclick="closeAddProject()">Cancelar</button>
      <button class="btn btn-primary" id="ap-save-btn" onclick="saveAddProject()">Crear proyecto</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ─── SUPABASE CONFIG ─────────────────────────────────────
const SUPABASE_URL = 'https://gnijqwvpwdqdpdegmrsa.supabase.co';
const SUPABASE_KEY = 'sb_publishable_mK1aHjTvf9lTvJ1c8Wmbug_vRkyR1O-';
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

// ─── STATE ───────────────────────────────────────────────
let projects = [];
let tasks = [];
let monthProgress = {mayo:0,junio:0,julio:0,agosto:0};
let currentView = 'pipeline';

const MONTHS = [
  {key:'mayo',label:'Mayo 2026',color:'#1E6FBF'},
  {key:'junio',label:'Junio 2026',color:'#0A7C55'},
  {key:'julio',label:'Julio 2026',color:'#B05800'},
  {key:'agosto',label:'Agosto 2026',color:'#6B35C1'},
];
const STATUSES = ['No Iniciado','En Progreso','Bloqueado','Completado'];
const STATUS_CFG = {
  'No Iniciado':{color:'#6B7A8D',bg:'#EEF0F4'},
  'En Progreso':{color:'#1563BB',bg:'#EAF1FC'},
  'Bloqueado':  {color:'#C0392B',bg:'#FDECEB'},
  'Completado': {color:'#0A7C55',bg:'#E8F7F2'},
};

// ─── SUPABASE LOAD ───────────────────────────────────────
async function loadAll() {
  setSyncing(true);
  try {
    const [pRes, tRes, mRes] = await Promise.all([
      db.from('projects').select('*').order('created_at'),
      db.from('tasks').select('*').order('id'),
      db.from('month_progress').select('*'),
    ]);
    if (pRes.error) throw pRes.error;
    if (tRes.error) throw tRes.error;
    if (mRes.error) throw mRes.error;

    projects = pRes.data;
    tasks = tRes.data;
    mRes.data.forEach(r => { monthProgress[r.month_key] = r.value; });

    rebuildProjectFilter();
    renderMonthProgress();
    renderAll();
  } catch(e) {
    showToast('Error cargando datos: ' + e.message, true);
    console.error(e);
  } finally {
    setSyncing(false);
    document.getElementById('loading-overlay').style.display = 'none';
  }
}

// ─── SUPABASE REAL-TIME ──────────────────────────────────
function subscribeRealtime() {
  db.channel('pipeline-changes')
    .on('postgres_changes', {event:'*', schema:'public', table:'tasks'}, () => loadAll())
    .on('postgres_changes', {event:'*', schema:'public', table:'projects'}, () => loadAll())
    .on('postgres_changes', {event:'*', schema:'public', table:'month_progress'}, () => loadAll())
    .subscribe();
}

// ─── SYNC INDICATOR ──────────────────────────────────────
function setSyncing(v) {
  const dot = document.getElementById('sync-dot');
  const lbl = document.getElementById('sync-label');
  if (v) {
    dot.classList.add('syncing');
    lbl.textContent = 'Sincronizando...';
  } else {
    dot.classList.remove('syncing');
    lbl.textContent = 'Conectado · datos en tiempo real';
  }
}

// ─── HELPERS ────────────────────────────────────────────
function projById(id) { return projects.find(p=>p.id===id) || {id:'?',name:'?',color:'#888'}; }
function fmtDate(s) {
  if(!s) return '–';
  const d = new Date(s+'T00:00:00');
  return d.toLocaleDateString('es-PE',{day:'2-digit',month:'short'}).replace(' de','');
}
function statusPill(s, sm) {
  const c = STATUS_CFG[s] || STATUS_CFG['No Iniciado'];
  return `<span class="gstatus-pill" style="background:${c.bg};color:${c.color}">${sm ? s.split(' ')[0] : s}</span>`;
}

// ─── METRICS ────────────────────────────────────────────
function renderMetrics() {
  const f = getFiltered();
  const total = f.length;
  const comp = f.filter(t=>t.status==='Completado').length;
  const prog = f.filter(t=>t.status==='En Progreso').length;
  const bloq = f.filter(t=>t.status==='Bloqueado').length;
  const pct = total ? Math.round(f.reduce((a,t)=>a+t.pct,0)/total) : 0;
  document.getElementById('metrics').innerHTML = `
    <div class="metric"><div class="metric-val">${total}</div><div class="metric-lbl">Total hitos</div><div class="metric-sub">${projects.length} proyectos</div></div>
    <div class="metric"><div class="metric-val" style="color:var(--green)">${comp}</div><div class="metric-lbl">Completados</div><div class="metric-sub">${total?Math.round(comp/total*100):0}% del total</div><div class="metric-bar"><div class="metric-bar-fill" style="width:${total?Math.round(comp/total*100):0}%;background:var(--green)"></div></div></div>
    <div class="metric"><div class="metric-val" style="color:var(--blue)">${prog}</div><div class="metric-lbl">En Progreso</div><div class="metric-sub">activos ahora</div><div class="metric-bar"><div class="metric-bar-fill" style="width:${total?Math.round(prog/total*100):0}%;background:var(--blue)"></div></div></div>
    <div class="metric"><div class="metric-val" style="color:var(--red)">${bloq}</div><div class="metric-lbl">Bloqueados</div><div class="metric-sub">requieren atención</div><div class="metric-bar"><div class="metric-bar-fill" style="width:${total?Math.round(bloq/total*100):0}%;background:var(--red)"></div></div></div>
    <div class="metric"><div class="metric-val" style="color:var(--brand)">${pct}%</div><div class="metric-lbl">Avance promedio</div><div class="metric-sub">hitos filtrados</div><div class="metric-bar"><div class="metric-bar-fill" style="width:${pct}%;background:var(--brand)"></div></div></div>
  `;
}

// ─── MONTH PROGRESS ─────────────────────────────────────
function renderMonthProgress() {
  document.getElementById('month-prog-grid').innerHTML = MONTHS.map(m=>`
    <div class="month-cell">
      <div class="month-cell-name">${m.label}</div>
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
        <div class="month-cell-pct" id="mpct-${m.key}">${monthProgress[m.key]}%</div>
        <input class="month-input" type="number" min="0" max="100" value="${monthProgress[m.key]}"
          onchange="updateMonthPct('${m.key}',this.value)">
      </div>
      <div class="month-cell-bar"><div class="month-cell-fill" id="mbar-${m.key}" style="width:${monthProgress[m.key]}%;background:${m.color}"></div></div>
    </div>
  `).join('');
}

async function updateMonthPct(key, val) {
  const v = Math.max(0, Math.min(100, parseInt(val)||0));
  monthProgress[key] = v;
  document.getElementById('mpct-'+key).textContent = v+'%';
  document.getElementById('mbar-'+key).style.width = v+'%';
  setSyncing(true);
  const {error} = await db.from('month_progress').upsert({month_key:key, value:v});
  setSyncing(false);
  if(error) showToast('Error guardando: '+error.message, true);
  else { showToast('Avance de '+key+' guardado'); if(currentView==='graficos') renderGraficos(); }
}

// ─── FILTERS ────────────────────────────────────────────
function getFiltered() {
  const p = document.getElementById('filt-proj').value;
  const s = document.getElementById('filt-status').value;
  const q = (document.getElementById('filt-search').value||'').toLowerCase();
  return tasks.filter(t =>
    (p==='all'||t.proj===p) &&
    (s==='all'||t.status===s) &&
    (!q||t.name.toLowerCase().includes(q))
  );
}

function rebuildProjectFilter() {
  const sel = document.getElementById('filt-proj');
  const cur = sel.value;
  sel.innerHTML = '<option value="all">Todos los proyectos</option>' +
    projects.map(p=>`<option value="${p.id}">${p.name}</option>`).join('');
  if(projects.find(p=>p.id===cur)) sel.value = cur;
  const ahSel = document.getElementById('ah-proj');
  if(ahSel) ahSel.innerHTML = projects.map(p=>`<option value="${p.id}">${p.name}</option>`).join('');
}

// ─── PIPELINE KANBAN ────────────────────────────────────
function renderPipeline() {
  const f = getFiltered();
  const cols = {};
  STATUSES.forEach(s=>cols[s]=[]);
  f.forEach(t=>cols[t.status].push(t));
  document.getElementById('view-pipeline').innerHTML =
    `<div class="sec-hdr"><h2>Pipeline de hitos</h2><span style="font-size:11px;color:var(--text3)">${f.length} hitos · haz clic para editar · cambios en tiempo real</span></div>` +
    `<div class="kanban">` + STATUSES.map(s => {
      const sc = STATUS_CFG[s];
      const cards = cols[s];
      return `<div class="col">
        <div class="col-hdr">
          <div class="col-hdr-title"><div class="col-hdr-dot" style="background:${sc.color}"></div><span style="color:${sc.color}">${s}</span></div>
          <span class="col-badge" style="background:${sc.bg};color:${sc.color}">${cards.length}</span>
        </div>
        <div class="col-body">
          ${cards.length===0 ? '<div class="empty-col">Sin hitos</div>' : cards.map(t => {
            const p = projById(t.proj);
            const pct = t.status==='Completado' ? 100 : t.pct;
            return `<div class="card" onclick="openEditHito(${t.id})">
              <div class="card-proj" style="background:${p.color}18;color:${p.color}">
                <div class="card-proj-dot" style="background:${p.color}"></div>${p.name.split('–')[0].trim()}
              </div>
              <div class="card-name">${t.name}</div>
              <div class="card-dates">${fmtDate(t.ini)} → ${fmtDate(t.fin)}</div>
              <div class="card-weight">Peso: ${t.weight}%</div>
              <div class="card-prog"><div class="card-prog-fill" style="width:${pct}%;background:${sc.color}"></div></div>
            </div>`;
          }).join('')}
        </div>
      </div>`;
    }).join('') + `</div>`;
}

// ─── GANTT ───────────────────────────────────────────────
function renderGantt() {
  const f = getFiltered();
  const C2S = new Date('2026-05-04'), C2E = new Date('2026-08-31');
  const totalMs = C2E - C2S;
  const mTicks = ['4 May','1 Jun','1 Jul','1 Ago','31 Ago'];
  const mPcts = [0,24,43,63,100];
  document.getElementById('view-gantt').innerHTML =
    `<div class="sec-hdr"><h2>Cronograma C2 (May–Ago 2026)</h2></div>
    <div class="gantt-wrap"><div class="gantt-inner">
    <table class="gantt-table">
      <thead><tr>
        <th style="width:200px">Hito</th><th style="width:120px">Proyecto</th>
        <th>Cronograma</th><th style="width:36px">%</th>
        <th style="width:110px">Estado</th><th style="width:100px">Fechas</th>
      </tr></thead>
      <tbody>
      ${f.map(t => {
        const p = projById(t.proj);
        const ts = new Date(t.ini+'T00:00:00'), te = new Date(t.fin+'T00:00:00');
        const left = Math.max(0,(ts-C2S)/totalMs*100);
        const width = Math.max(1,(te-ts)/totalMs*100);
        const sc = STATUS_CFG[t.status];
        const pct = t.status==='Completado' ? 100 : t.pct;
        return `<tr>
          <td><div class="gname" title="${t.name}">${t.name}</div></td>
          <td><div style="display:flex;align-items:center;gap:5px"><div style="width:8px;height:8px;border-radius:50%;background:${p.color};flex-shrink:0"></div><span style="font-size:11px;color:var(--text2)">${p.name.split('–')[0].trim()}</span></div></td>
          <td style="padding:6px 10px">
            <div class="gtrack">
              ${mPcts.map((mp,i)=>`<div style="position:absolute;top:-8px;left:${mp}%;font-size:8px;color:var(--text3);white-space:nowrap;transform:translateX(-50%)">${mTicks[i]}</div><div style="position:absolute;top:0;left:${mp}%;height:16px;width:1px;background:var(--border)"></div>`).join('')}
              <div class="gbar" style="left:${left.toFixed(1)}%;width:${width.toFixed(1)}%;background:${sc.color}40"></div>
              <div class="gbar" style="left:${left.toFixed(1)}%;width:${Math.min(width,width*pct/100).toFixed(1)}%;background:${sc.color}"></div>
            </div>
          </td>
          <td class="gpct">${pct}%</td>
          <td>${statusPill(t.status,true)}</td>
          <td style="font-size:10px;color:var(--text3)">${fmtDate(t.ini)}<br>${fmtDate(t.fin)}</td>
        </tr>`;
      }).join('')}
      </tbody>
    </table></div></div>`;
}

// ─── CHARTS ─────────────────────────────────────────────
let chartInstances = {};
function destroyChart(id) { if(chartInstances[id]){chartInstances[id].destroy();delete chartInstances[id];} }

function renderGraficos() {
  document.getElementById('view-graficos').innerHTML = `
    <div class="sec-hdr"><h2>Resumen de avance y cumplimiento</h2></div>
    <div class="charts-grid">
      <div class="chart-card"><div class="chart-title">Estado de hitos</div><div class="chart-canvas-wrap"><canvas id="ch-estado"></canvas></div></div>
      <div class="chart-card"><div class="chart-title">Avance por proyecto (%)</div><div class="chart-canvas-wrap"><canvas id="ch-proj"></canvas></div></div>
      <div class="chart-card"><div class="chart-title">Hitos por proyecto</div><div class="chart-canvas-wrap"><canvas id="ch-dist"></canvas></div></div>
      <div class="chart-card chart-card-wide"><div class="chart-title">Avance mensual del equipo</div><div class="chart-canvas-wrap"><canvas id="ch-mensual"></canvas></div></div>
      <div class="chart-card"><div class="chart-title">Cumplimiento a tiempo</div><div class="chart-canvas-wrap"><canvas id="ch-tiempo"></canvas></div></div>
    </div>`;

  const TODAY = new Date('2026-05-15');

  destroyChart('estado');
  chartInstances['estado'] = new Chart(document.getElementById('ch-estado'),{
    type:'doughnut',
    data:{labels:STATUSES,datasets:[{data:STATUSES.map(s=>tasks.filter(t=>t.status===s).length),backgroundColor:STATUSES.map(s=>STATUS_CFG[s].bg),borderColor:STATUSES.map(s=>STATUS_CFG[s].color),borderWidth:2,hoverOffset:4}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font:{size:10,family:'DM Sans'},padding:8,boxWidth:10}}}}
  });

  destroyChart('proj');
  const projAvg = projects.map(p=>{
    const pt = tasks.filter(t=>t.proj===p.id);
    if(!pt.length) return 0;
    const wp = pt.reduce((a,t)=>a+t.weight,0)||1;
    return Math.round(pt.reduce((a,t)=>a+(t.pct*t.weight),0)/wp);
  });
  chartInstances['proj'] = new Chart(document.getElementById('ch-proj'),{
    type:'bar',
    data:{labels:projects.map(p=>p.name.split('–')[0].trim()),datasets:[{label:'Avance %',data:projAvg,backgroundColor:projects.map(p=>p.color+'44'),borderColor:projects.map(p=>p.color),borderWidth:2,borderRadius:6}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{min:0,max:100,ticks:{font:{size:10},callback:v=>v+'%'}},x:{ticks:{font:{size:9}}}}}
  });

  destroyChart('dist');
  chartInstances['dist'] = new Chart(document.getElementById('ch-dist'),{
    type:'pie',
    data:{labels:projects.map(p=>p.name.split('–')[0].trim()),datasets:[{data:projects.map(p=>tasks.filter(t=>t.proj===p.id).length),backgroundColor:projects.map(p=>p.color+'55'),borderColor:projects.map(p=>p.color),borderWidth:2}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font:{size:10,family:'DM Sans'},padding:6,boxWidth:10}}}}
  });

  destroyChart('mensual');
  let acc = 0;
  chartInstances['mensual'] = new Chart(document.getElementById('ch-mensual'),{
    type:'bar',
    data:{
      labels:MONTHS.map(m=>m.label),
      datasets:[
        {type:'bar',label:'Avance mensual %',data:MONTHS.map(m=>monthProgress[m.key]),backgroundColor:MONTHS.map(m=>m.color+'44'),borderColor:MONTHS.map(m=>m.color),borderWidth:2,borderRadius:6},
        {type:'line',label:'Acumulado',data:MONTHS.map(m=>{acc=Math.max(acc,monthProgress[m.key]);return acc;}),borderColor:'#E85F1E',borderWidth:2,pointBackgroundColor:'#E85F1E',pointRadius:4,fill:false,tension:.3}
      ]
    },
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{font:{size:10,family:'DM Sans'}}}},scales:{y:{min:0,max:100,ticks:{callback:v=>v+'%',font:{size:10}}}}}
  });

  destroyChart('tiempo');
  const vencidos = tasks.filter(t=>{const fe=new Date(t.fin+'T00:00:00');return fe<TODAY&&t.status!=='Completado';}).length;
  const aTime = tasks.length - vencidos;
  chartInstances['tiempo'] = new Chart(document.getElementById('ch-tiempo'),{
    type:'doughnut',
    data:{labels:['A tiempo / OK','Vencidos sin completar'],datasets:[{data:[aTime,vencidos],backgroundColor:['#E8F7F2','#FDECEB'],borderColor:['#0A7C55','#C0392B'],borderWidth:2}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font:{size:10,family:'DM Sans'},padding:8,boxWidth:10}}}}
  });
}

// ─── POR PROYECTO ────────────────────────────────────────
function renderPorProyecto() {
  const f = getFiltered();
  document.getElementById('view-proyectos').innerHTML =
    `<div class="sec-hdr"><h2>Detalle por proyecto</h2></div><div class="proj-grid">` +
    projects.map(p => {
      const pt = f.filter(t=>t.proj===p.id);
      if(!pt.length) return '';
      const wp = pt.reduce((a,t)=>a+t.weight,0)||1;
      const avg = Math.round(pt.reduce((a,t)=>a+(t.pct*t.weight),0)/wp);
      const comp = pt.filter(t=>t.status==='Completado').length;
      const prog = pt.filter(t=>t.status==='En Progreso').length;
      const bloq = pt.filter(t=>t.status==='Bloqueado').length;
      return `<div class="proj-card">
        <div class="proj-card-hdr">
          <div><div class="proj-name">${p.name}</div><div style="font-size:11px;color:var(--text3);margin-top:2px">${pt.length} hitos</div></div>
          <div class="proj-pct" style="color:${p.color}">${avg}%</div>
        </div>
        <div class="proj-bar-wrap"><div class="proj-bar-fill" style="width:${avg}%;background:${p.color}"></div></div>
        <div class="proj-stats">
          ${comp?`<span class="proj-stat" style="background:var(--green-bg);color:var(--green)">${comp} completados</span>`:''}
          ${prog?`<span class="proj-stat" style="background:var(--blue-bg);color:var(--blue)">${prog} en progreso</span>`:''}
          ${bloq?`<span class="proj-stat" style="background:var(--red-bg);color:var(--red)">${bloq} bloqueados</span>`:''}
        </div>
        <div class="proj-hitos">
          ${pt.map(t=>{const sc=STATUS_CFG[t.status];return`<div class="proj-hito-row" onclick="openEditHito(${t.id})">
            <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:240px">${t.name}</span>
            <span style="display:flex;gap:6px;align-items:center;margin-left:8px;flex-shrink:0">
              <span style="font-size:10px;color:var(--text3)">${t.weight}%</span>
              ${statusPill(t.status,true)}
            </span>
          </div>`;}).join('')}
        </div>
      </div>`;
    }).join('') + `</div>`;
}

// ─── EDIT HITO ───────────────────────────────────────────
function openEditHito(id) {
  const t = tasks.find(x=>x.id===id);
  if(!t) return;
  const p = projById(t.proj);
  document.getElementById('mh-id').value = id;
  document.getElementById('mh-title').textContent = t.name;
  document.getElementById('mh-proj-label').textContent = p.name;
  document.getElementById('mh-name').value = t.name;
  document.getElementById('mh-ini').value = t.ini;
  document.getElementById('mh-fin').value = t.fin;
  document.getElementById('mh-status').value = t.status;
  document.getElementById('mh-weight').value = t.weight;
  document.getElementById('mh-pct').value = t.pct;
  document.getElementById('mh-notes').value = t.notes||'';
  document.getElementById('modal-hito-overlay').classList.add('open');
}

function closeModalHito(e) {
  if(!e||e.target===document.getElementById('modal-hito-overlay'))
    document.getElementById('modal-hito-overlay').classList.remove('open');
}

async function saveHito() {
  const id = parseInt(document.getElementById('mh-id').value);
  const btn = document.getElementById('mh-save-btn');
  btn.disabled = true; btn.textContent = 'Guardando...';
  const status = document.getElementById('mh-status').value;
  let pct = Math.max(0,Math.min(100,parseInt(document.getElementById('mh-pct').value)||0));
  if(status==='Completado') pct = 100;
  const payload = {
    name: document.getElementById('mh-name').value,
    ini:  document.getElementById('mh-ini').value,
    fin:  document.getElementById('mh-fin').value,
    status, weight: parseInt(document.getElementById('mh-weight').value)||10,
    pct, notes: document.getElementById('mh-notes').value,
  };
  setSyncing(true);
  const {error} = await db.from('tasks').update(payload).eq('id', id);
  setSyncing(false);
  btn.disabled = false; btn.textContent = 'Guardar';
  if(error) { showToast('Error: '+error.message, true); return; }
  document.getElementById('modal-hito-overlay').classList.remove('open');
  showToast('Hito actualizado y guardado en la nube');
  await loadAll();
}

async function deleteHito() {
  const id = parseInt(document.getElementById('mh-id').value);
  if(!confirm('¿Eliminar este hito? Esta acción no se puede deshacer.')) return;
  setSyncing(true);
  const {error} = await db.from('tasks').delete().eq('id', id);
  setSyncing(false);
  if(error) { showToast('Error: '+error.message, true); return; }
  document.getElementById('modal-hito-overlay').classList.remove('open');
  showToast('Hito eliminado');
  await loadAll();
}

// ─── ADD HITO ────────────────────────────────────────────
function openAddHito() {
  document.getElementById('ah-proj').innerHTML = projects.map(p=>`<option value="${p.id}">${p.name}</option>`).join('');
  document.getElementById('modal-add-hito-overlay').classList.add('open');
}
function closeAddHito() { document.getElementById('modal-add-hito-overlay').classList.remove('open'); }

async function saveAddHito() {
  const name = document.getElementById('ah-name').value.trim();
  if(!name) { alert('El nombre es obligatorio'); return; }
  const btn = document.getElementById('ah-save-btn');
  btn.disabled = true; btn.textContent = 'Guardando...';
  const payload = {
    proj:   document.getElementById('ah-proj').value,
    name,
    ini:    document.getElementById('ah-ini').value,
    fin:    document.getElementById('ah-fin').value,
    status: document.getElementById('ah-status').value,
    weight: parseInt(document.getElementById('ah-weight').value)||10,
    pct: 0, notes: '',
  };
  setSyncing(true);
  const {error} = await db.from('tasks').insert(payload);
  setSyncing(false);
  btn.disabled = false; btn.textContent = 'Agregar';
  if(error) { showToast('Error: '+error.message, true); return; }
  closeAddHito();
  showToast('Hito agregado y guardado en la nube');
  await loadAll();
}

// ─── ADD PROJECT ─────────────────────────────────────────
function openAddProject() { document.getElementById('modal-add-proj-overlay').classList.add('open'); }
function closeAddProject() { document.getElementById('modal-add-proj-overlay').classList.remove('open'); }

async function saveAddProject() {
  const name = document.getElementById('ap-name').value.trim();
  const rawId = document.getElementById('ap-id').value.trim().replace(/\s+/g,'_').toLowerCase();
  if(!name||!rawId) { alert('Nombre e ID son obligatorios'); return; }
  const btn = document.getElementById('ap-save-btn');
  btn.disabled = true; btn.textContent = 'Creando...';
  const payload = { id: rawId, name, color: document.getElementById('ap-color').value };
  setSyncing(true);
  const {error} = await db.from('projects').insert(payload);
  setSyncing(false);
  btn.disabled = false; btn.textContent = 'Crear proyecto';
  if(error) { showToast('Error: '+error.message, true); return; }
  closeAddProject();
  showToast('Proyecto "'+name+'" creado');
  await loadAll();
}

// ─── VIEW CONTROL ────────────────────────────────────────
function setView(v, el) {
  currentView = v;
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  ['pipeline','gantt','graficos','proyectos'].forEach(id => {
    document.getElementById('view-'+id).classList.toggle('hidden', id!==v);
  });
  renderCurrentView();
}

function renderCurrentView() {
  renderMetrics();
  if(currentView==='pipeline') renderPipeline();
  else if(currentView==='gantt') renderGantt();
  else if(currentView==='graficos') renderGraficos();
  else if(currentView==='proyectos') renderPorProyecto();
}

function renderAll() {
  renderMetrics();
  renderPipeline();
  if(currentView==='gantt') renderGantt();
  else if(currentView==='graficos') renderGraficos();
  else if(currentView==='proyectos') renderPorProyecto();
}

// ─── TOAST ───────────────────────────────────────────────
function showToast(msg, isError=false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (isError?' error':'');
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2500);
}

// ─── INIT ────────────────────────────────────────────────
loadAll();
subscribeRealtime();
</script>
