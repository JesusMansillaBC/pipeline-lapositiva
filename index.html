<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iniciativas – BC Salud</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --brand:#E85F1E;--brand2:#1E4FA3;
  --bg:#F4F5F7;--surface:#FFFFFF;--surface2:#F9FAFB;
  --border:#E2E5EA;--border2:#CBD0D8;
  --text:#1A2335;--text2:#4A5568;--text3:#8A9BB0;
  --green:#0A7C55;--green-bg:#E8F7F2;
  --blue:#1563BB;--blue-bg:#EAF1FC;
  --amber:#B05800;--amber-bg:#FEF3E5;
  --red:#C0392B;--red-bg:#FDECEB;
  --gray:#6B7A8D;--gray-bg:#EEF0F4;
  --radius:10px;--radius-lg:16px;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 4px 12px rgba(0,0,0,.05);
  --shadow-lg:0 4px 20px rgba(0,0,0,.1);
  font-family:'DM Sans',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}

/* TOPBAR */
.topbar{background:var(--surface);border-bottom:1.5px solid var(--border);padding:0 28px;display:flex;align-items:center;justify-content:space-between;height:64px;position:sticky;top:0;z-index:200}
.topbar-left{display:flex;align-items:center;gap:14px}
.logo{width:36px;height:36px;background:var(--brand);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo svg{width:20px;height:20px;fill:#fff}
.topbar-titles{display:flex;flex-direction:column;gap:2px}
.topbar-title{font-size:16px;font-weight:700;color:var(--text);letter-spacing:-.01em;line-height:1.1}
.topbar-sub{font-size:12px;font-weight:500;color:var(--text2);display:flex;align-items:center;gap:6px}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--green);display:inline-block;flex-shrink:0}
.sync-dot.syncing{background:var(--amber);animation:pulse .8s ease-in-out infinite}
.topbar-right{display:flex;align-items:center;gap:8px}
.btn{font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;padding:6px 14px;border-radius:7px;border:1.5px solid var(--border2);background:var(--surface);color:var(--text2);cursor:pointer;transition:.15s;display:flex;align-items:center;gap:5px}
.btn:hover{background:var(--surface2);border-color:var(--brand);color:var(--brand)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-primary{background:var(--brand);color:#fff;border-color:var(--brand)}
.btn-primary:hover{background:#cc4e12;border-color:#cc4e12;color:#fff}

/* NAV */
.nav{background:var(--surface);border-bottom:1.5px solid var(--border);padding:0 28px;display:flex;gap:4px}
.nav-tab{font-size:13px;font-weight:500;padding:10px 16px;border-bottom:2.5px solid transparent;color:var(--text3);cursor:pointer;transition:.15s;user-select:none}
.nav-tab.active{color:var(--brand);border-bottom-color:var(--brand)}
.nav-tab:hover:not(.active){color:var(--text2)}

/* MAIN */
.main{padding:20px 28px;max-width:1500px;margin:0 auto}

/* METRICS */
.metrics{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:16px}
.metric{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px;box-shadow:var(--shadow)}
.metric-val{font-size:24px;font-weight:600;line-height:1;margin-bottom:3px}
.metric-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;font-weight:600}
.metric-sub{font-size:10px;color:var(--text3);margin-top:2px}
.metric-bar{height:3px;background:var(--border);border-radius:2px;margin-top:8px;overflow:hidden}
.metric-bar-fill{height:100%;border-radius:2px;transition:width .5s}

/* SEMAFORO BANNER */
.semaforo-wrap{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.semaforo-card{border-radius:var(--radius);padding:10px 14px;display:flex;align-items:center;gap:10px;border:1.5px solid}
.semaforo-icon{font-size:20px;flex-shrink:0}
.semaforo-val{font-size:20px;font-weight:700}
.semaforo-lbl{font-size:11px;font-weight:500;margin-top:1px}

/* AVANCE MENSUAL AUTO */
.month-prog-wrap{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-lg);padding:14px 18px;margin-bottom:16px;box-shadow:var(--shadow)}
.month-prog-title{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
.month-prog-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.month-cell{border:1.5px solid var(--border);border-radius:var(--radius);padding:10px 12px}
.month-cell-name{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.month-cell-pct{font-size:22px;font-weight:700;color:var(--text)}
.month-cell-detail{font-size:10px;color:var(--text3);margin-top:2px;margin-bottom:5px}
.month-cell-bar{height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.month-cell-fill{height:100%;border-radius:2px;transition:width .6s}

/* FILTERS */
.filters{display:flex;gap:8px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
.filters select,.filters input{font-family:'DM Sans',sans-serif;font-size:12px;height:32px;padding:0 10px;border:1.5px solid var(--border2);border-radius:7px;background:var(--surface);color:var(--text);outline:none}
.filters select:focus,.filters input:focus{border-color:var(--brand)}
.filter-lbl{font-size:11px;color:var(--text3);font-weight:500}

/* KANBAN */
.kanban{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:28px}
.col{background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;min-height:160px}
.col-hdr{padding:10px 14px 8px;display:flex;align-items:center;justify-content:space-between;border-bottom:1.5px solid var(--border)}
.col-hdr-title{font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;display:flex;align-items:center;gap:7px}
.col-hdr-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.col-badge{font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px}
.col-body{padding:7px;display:flex;flex-direction:column;gap:5px;min-height:80px}
.card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:9px 11px;cursor:pointer;transition:.15s;position:relative}
.card:hover{border-color:var(--brand);box-shadow:var(--shadow)}
.card-proj{font-size:10px;font-weight:600;padding:1px 7px;border-radius:20px;display:inline-flex;align-items:center;gap:3px;margin-bottom:4px}
.card-proj-dot{width:5px;height:5px;border-radius:50%}
.card-name{font-size:11px;font-weight:500;color:var(--text);line-height:1.35;margin-bottom:3px}
.card-dates{font-size:10px;color:var(--text3);margin-bottom:2px}
.card-weight{font-size:10px;font-weight:600;color:var(--text3)}
.card-semaforo{font-size:11px;position:absolute;top:7px;right:8px}
.card-prog{margin-top:5px;height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.card-prog-fill{height:100%;border-radius:2px}
.empty-col{padding:20px 10px;text-align:center;font-size:11px;color:var(--text3)}

/* GANTT */
.gantt-wrap{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:28px;box-shadow:var(--shadow)}
.gantt-inner{overflow-x:auto}
.gantt-table{width:100%;border-collapse:collapse;min-width:1100px}
.gantt-table th{background:#1A2335;color:#fff;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;padding:9px 12px;border-bottom:2px solid var(--brand);text-align:left;white-space:nowrap}
.gantt-table td{padding:6px 10px;border-bottom:1px solid var(--border);vertical-align:middle}
.gantt-proj-row td{background:#F0F2F5;font-weight:700;font-size:12px}
.gantt-hito-row td{background:var(--surface)}
.gantt-hito-row:hover td{background:#FAFBFC}
.gname{font-size:12px;font-weight:500;color:var(--text);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.gproj-name{font-size:12px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:6px}
.gtrack{width:100%;min-width:420px;height:18px;background:#E8EBF0;border-radius:4px;position:relative;overflow:visible;margin-top:10px}
.gbar{position:absolute;height:100%;border-radius:4px;top:0}
.gweek-tick{position:absolute;top:-14px;font-size:8px;font-weight:600;color:#fff;white-space:nowrap;transform:translateX(-50%);background:#1A2335;padding:1px 4px;border-radius:3px}
.gweek-line{position:absolute;top:0;height:18px;width:1px;background:rgba(255,255,255,.4)}
.gmonth-hdr{position:absolute;top:-26px;font-size:9px;font-weight:700;color:var(--brand);letter-spacing:.05em;text-transform:uppercase}
.gpct{font-size:11px;font-weight:600;color:var(--text2);text-align:right;width:34px}
.gstatus-pill{font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;white-space:nowrap}
.gsemaforo{font-size:13px;text-align:center;width:24px}

/* CHARTS */
.charts-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:28px}
.chart-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-lg);padding:18px;box-shadow:var(--shadow)}
.chart-card-wide{grid-column:span 2}
.chart-title{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px}
.chart-canvas-wrap{position:relative;height:200px}

/* POR PROYECTO */
.proj-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:14px;margin-bottom:28px}
.proj-card{border:2px solid var(--border);border-radius:var(--radius-lg);padding:16px 18px;box-shadow:var(--shadow);transition:.2s}
.proj-card-hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px}
.proj-name{font-size:13px;font-weight:700;color:var(--text)}
.proj-pct{font-size:22px;font-weight:700}
.proj-bar-wrap{height:6px;background:rgba(0,0,0,.08);border-radius:3px;overflow:hidden;margin-bottom:10px}
.proj-bar-fill{height:100%;border-radius:3px;transition:width .5s}
.proj-stats{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.proj-stat{font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px}
.proj-hitos{display:flex;flex-direction:column;gap:2px}
.proj-hito-row{display:flex;align-items:center;justify-content:space-between;font-size:11px;padding:4px 0;border-bottom:1px solid rgba(0,0,0,.06);cursor:pointer}
.proj-hito-row:last-child{border-bottom:none}
.proj-hito-row:hover{opacity:.75}
.proj-cumpl-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;margin-top:4px;display:inline-block}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(15,25,50,.45);z-index:1000;align-items:center;justify-content:center;backdrop-filter:blur(2px)}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border-radius:var(--radius-lg);border:1.5px solid var(--border);width:500px;max-height:88vh;overflow-y:auto;box-shadow:var(--shadow-lg)}
.modal-hdr{padding:16px 20px 12px;border-bottom:1.5px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between}
.modal-title{font-size:14px;font-weight:600;color:var(--text)}
.modal-subtitle{font-size:11px;color:var(--text3);margin-top:2px}
.modal-close{font-size:18px;color:var(--text3);background:none;border:none;cursor:pointer;line-height:1;padding:2px 4px}
.modal-close:hover{color:var(--text)}
.modal-body{padding:16px 20px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:10px}
.form-row.full{grid-template-columns:1fr}
.form-group{display:flex;flex-direction:column;gap:4px}
.form-group label{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.05em}
.form-group input,.form-group select,.form-group textarea{font-family:'DM Sans',sans-serif;font-size:13px;padding:7px 10px;border:1.5px solid var(--border2);border-radius:7px;color:var(--text);background:var(--surface);outline:none;transition:.15s}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(232,95,30,.1)}
.form-group textarea{resize:vertical;min-height:56px}
.bloq-field{display:none}
.bloq-field.show{display:flex}
.modal-ftr{padding:10px 20px 14px;border-top:1.5px solid var(--border);display:flex;justify-content:flex-end;gap:8px}

/* MISC */
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.sec-hdr h2{font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.06em}
.toast{position:fixed;bottom:24px;right:24px;background:var(--text);color:#fff;font-size:12px;font-weight:500;padding:10px 16px;border-radius:8px;z-index:2000;transform:translateY(60px);opacity:0;transition:.3s;pointer-events:none}
.toast.show{transform:translateY(0);opacity:1}
.toast.error{background:var(--red)}
.loading-overlay{position:fixed;inset:0;background:rgba(255,255,255,.88);z-index:3000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px}
.loading-spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--brand);border-radius:50%;animation:spin .7s linear infinite}
.loading-text{font-size:13px;color:var(--text3);font-weight:500}
.hidden{display:none!important}
.view-section{animation:fadeIn .2s ease}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<div class="loading-overlay" id="loading-overlay">
  <div class="loading-spinner"></div>
  <div class="loading-text">Cargando datos del equipo...</div>
</div>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-left">
    <div class="logo"><svg viewBox="0 0 24 24"><path d="M12 2L2 7v10l10 5 10-5V7L12 2zm0 2.5l7.5 3.75-7.5 3.75L4.5 8.25 12 4.5zm-8.5 5.2l8.5 4.25v7.55L3.5 17.25V9.7zm10 11.8v-7.55l8.5-4.25v7.55L13.5 21.5z"/></svg></div>
    <div class="topbar-titles">
      <div class="topbar-title">Iniciativas – BC Salud</div>
      <div class="topbar-sub">
        <span class="sync-dot" id="sync-dot"></span>
        <span id="sync-label">Seguimiento de Iniciativas · La Positiva Seguros</span>
      </div>
    </div>
  </div>
  <div class="topbar-right">
    <button class="btn" onclick="openAddProject()">＋ Proyecto</button>
    <button class="btn btn-primary" onclick="openAddHito()">＋ Hito</button>
  </div>
</div>

<!-- NAV -->
<div class="nav">
  <div class="nav-tab active" onclick="setView('kanban',this)">Kanban</div>
  <div class="nav-tab" onclick="setView('gantt',this)">Cronograma</div>
  <div class="nav-tab" onclick="setView('graficos',this)">Gráficos</div>
  <div class="nav-tab" onclick="setView('proyectos',this)">Por Proyecto</div>
</div>

<div class="main">
  <!-- METRICS -->
  <div class="metrics" id="metrics"></div>

  <!-- SEMÁFOROS -->
  <div class="semaforo-wrap" id="semaforos"></div>

  <!-- AVANCE MENSUAL AUTO -->
  <div class="month-prog-wrap">
    <div class="month-prog-title">Avance mensual estimado del equipo — calculado automáticamente por peso de hitos</div>
    <div class="month-prog-grid" id="month-prog-grid"></div>
  </div>

  <!-- FILTERS -->
  <div class="filters">
    <span class="filter-lbl">Proyecto:</span>
    <select id="filt-proj" onchange="renderCurrentView()"><option value="all">Todos los proyectos</option></select>
    <span class="filter-lbl">Estado:</span>
    <select id="filt-status" onchange="renderCurrentView()">
      <option value="all">Todos</option>
      <option>No Iniciado</option><option>En Progreso</option>
      <option>Bloqueado</option><option>Completado</option>
    </select>
    <input type="text" id="filt-search" placeholder="Buscar hito..." oninput="renderCurrentView()" style="width:180px">
  </div>

  <div id="view-kanban" class="view-section"></div>
  <div id="view-gantt" class="view-section hidden"></div>
  <div id="view-graficos" class="view-section hidden"></div>
  <div id="view-proyectos" class="view-section hidden"></div>
</div>

<!-- MODAL EDITAR HITO -->
<div class="modal-overlay" id="modal-hito-overlay" onclick="closeModalHito(event)">
  <div class="modal">
    <div class="modal-hdr">
      <div><div class="modal-title" id="mh-title">Editar hito</div><div class="modal-subtitle" id="mh-proj-label"></div></div>
      <button class="modal-close" onclick="closeModalHito()">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="mh-id">
      <div class="form-row full"><div class="form-group"><label>Nombre del hito</label><input id="mh-name" type="text"></div></div>
      <div class="form-row">
        <div class="form-group"><label>Fecha inicio</label><input id="mh-ini" type="date"></div>
        <div class="form-group"><label>Fecha fin</label><input id="mh-fin" type="date"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Estado</label>
          <select id="mh-status" onchange="toggleBloqField(this.value)">
            <option>No Iniciado</option><option>En Progreso</option>
            <option>Bloqueado</option><option>Completado</option>
          </select>
        </div>
        <div class="form-group"><label>Peso % en proyecto</label><input id="mh-weight" type="number" min="0" max="100"></div>
      </div>
      <div class="form-row full"><div class="form-group"><label>% Avance (0–100)</label><input id="mh-pct" type="number" min="0" max="100"></div></div>
      <div class="form-row full bloq-field" id="bloq-field"><div class="form-group"><label>🔴 Motivo del bloqueo</label><textarea id="mh-bloq" rows="2" placeholder="Describe por qué está bloqueado este hito..."></textarea></div></div>
      <div class="form-row full"><div class="form-group"><label>Notas</label><textarea id="mh-notes" rows="2"></textarea></div></div>
    </div>
    <div class="modal-ftr">
      <button class="btn" onclick="deleteHito()" style="color:var(--red);border-color:var(--red)">Eliminar</button>
      <button class="btn" onclick="closeModalHito()">Cancelar</button>
      <button class="btn btn-primary" id="mh-save-btn" onclick="saveHito()">Guardar</button>
    </div>
  </div>
</div>

<!-- MODAL NUEVO HITO -->
<div class="modal-overlay" id="modal-add-hito-overlay" onclick="e=>e.target===document.getElementById('modal-add-hito-overlay')&&closeAddHito()">
  <div class="modal">
    <div class="modal-hdr">
      <div><div class="modal-title">Nuevo hito</div></div>
      <button class="modal-close" onclick="closeAddHito()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-row full"><div class="form-group"><label>Proyecto</label><select id="ah-proj"></select></div></div>
      <div class="form-row full"><div class="form-group"><label>Nombre del hito</label><input id="ah-name" type="text"></div></div>
      <div class="form-row">
        <div class="form-group"><label>Fecha inicio</label><input id="ah-ini" type="date" value="2026-05-04"></div>
        <div class="form-group"><label>Fecha fin</label><input id="ah-fin" type="date" value="2026-08-31"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Estado</label>
          <select id="ah-status"><option>No Iniciado</option><option>En Progreso</option><option>Bloqueado</option><option>Completado</option></select>
        </div>
        <div class="form-group"><label>Peso %</label><input id="ah-weight" type="number" min="0" max="100" value="10"></div>
      </div>
    </div>
    <div class="modal-ftr">
      <button class="btn" onclick="closeAddHito()">Cancelar</button>
      <button class="btn btn-primary" id="ah-save-btn" onclick="saveAddHito()">Agregar</button>
    </div>
  </div>
</div>

<!-- MODAL NUEVO PROYECTO -->
<div class="modal-overlay" id="modal-add-proj-overlay" onclick="e=>e.target===document.getElementById('modal-add-proj-overlay')&&closeAddProject()">
  <div class="modal">
    <div class="modal-hdr">
      <div><div class="modal-title">Nuevo proyecto</div></div>
      <button class="modal-close" onclick="closeAddProject()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-row full"><div class="form-group"><label>Nombre del proyecto</label><input id="ap-name" type="text" placeholder="Ej: Automatización de Suscripción"></div></div>
      <div class="form-row">
        <div class="form-group"><label>Color</label><input id="ap-color" type="color" value="#1E6FBF" style="height:36px;padding:2px 4px;width:100%"></div>
        <div class="form-group"><label>ID (sin espacios)</label><input id="ap-id" type="text" placeholder="ej: auto_susc"></div>
      </div>
    </div>
    <div class="modal-ftr">

// ─── SEMÁFORO HELPERS ────────────────────────────────────
function getSemaforo(t) {
  const fin = new Date(t.fin+'T00:00:00');
  const diffDays = Math.ceil((fin - TODAY) / 86400000);
  if (t.status === 'Completado') return {icon:'✅', label:'Completado a tiempo', color:'var(--green)'};
  if (fin < TODAY) return {icon:'🔴', label:'Vencido', color:'var(--red)'};
  if (diffDays <= WARN_DAYS) return {icon:'🟡', label:`Vence en ${diffDays}d`, color:'var(--amber)'};
  return {icon:'🟢', label:'En tiempo', color:'var(--green)'};
}

// ─── AVANCE MENSUAL AUTO ─────────────────────────────────
function calcMonthProgress(taskList) {
  return MONTHS.map(m => {
    const mIni = new Date(m.ini), mFin = new Date(m.fin);
    // Hitos cuya ventana de trabajo intersecta con el mes
    const relevant = taskList.filter(t => {
      if (!t.ini || !t.fin) return false;
      const tIni = new Date(t.ini+'T00:00:00'), tFin = new Date(t.fin+'T00:00:00');
      return tIni <= mFin && tFin >= mIni;
    });
    if (!relevant.length) return {key:m.key, label:m.label, color:m.color, pct:0, hitos:0};
    // Peso proporcional dentro del mes
    let sumWeight = 0, sumWPct = 0;
    relevant.forEach(t => {
      const tIni = new Date(t.ini+'T00:00:00'), tFin = new Date(t.fin+'T00:00:00');
      const totalDays = Math.max(1,(tFin-tIni)/86400000);
      const overlapIni = tIni < mIni ? mIni : tIni;
      const overlapFin = tFin > mFin ? mFin : tFin;
      const overlapDays = Math.max(0,(overlapFin-overlapIni)/86400000);
      const proportion = overlapDays / totalDays;
      const effectiveWeight = (t.weight||10) * proportion;
      sumWeight += effectiveWeight;
      sumWPct += effectiveWeight * (t.status==='Completado'?100:t.pct||0);
    });
    const pct = sumWeight > 0 ? Math.round(sumWPct / sumWeight) : 0;
    return {key:m.key, label:m.label, color:m.color, pct, hitos:relevant.length};
  });
}

async function loadAll() {

      db.from('tasks').select('*').order('id'),
    ]);
    if (pRes.error) throw pRes.error;

    projects = pRes.data;
    tasks = tRes.data;
    rebuildProjectFilter();
    renderAll();
  } catch(e) {
    showToast('Error cargando datos: '+e.message, true);
  } finally {
    setSyncing(false);
    document.getElementById('loading-overlay').style.display = 'none';
  }
}

function subscribeRealtime() {
  db.channel('changes').on('postgres_changes',{event:'*',schema:'public',table:'tasks'},()=>loadAll())

}

// ─── GANTT ────────────────────────────────────────────────
function renderGantt() {
  const f = getFiltered();
  const C2S = new Date('2026-05-04'), C2E = new Date('2026-08-31');
  const totalMs = C2E - C2S;

  // Agrupar hitos por proyecto manteniendo orden
  const projOrder = [];
  const byProj = {};
  f.forEach(t => {
    if(!byProj[t.proj]){ byProj[t.proj]=[]; projOrder.push(t.proj); }
    byProj[t.proj].push(t);
  });

  // Generar ticks semanales
  function getWeekTicks() {
    const ticks = [];
    const months = [
      {label:'MAYO',    start:new Date('2026-05-04'), color:'#1E6FBF'},
      {label:'JUNIO',   start:new Date('2026-06-01'), color:'#0A7C55'},
      {label:'JULIO',   start:new Date('2026-07-01'), color:'#B05800'},
      {label:'AGOSTO',  start:new Date('2026-08-01'), color:'#6B35C1'},
    ];
    months.forEach(m => {
      const pct = (m.start - C2S) / totalMs * 100;
      ticks.push({type:'month', label:m.label, pct, color:m.color});
    });
    // Semanas
    let d = new Date('2026-05-04');
    while(d <= C2E) {
      const pct = (d - C2S) / totalMs * 100;
      ticks.push({type:'week', label:`${d.getDate()}/${d.getMonth()+1}`, pct});
      d = new Date(d.getTime() + 7*86400000);
    }
    return ticks;
  }
  const ticks = getWeekTicks();

  const trackHTML = (t) => {
    const sc = STATUS_CFG[t.status];
    const pct = t.status==='Completado'?100:t.pct;
    const ts = new Date(t.ini+'T00:00:00'), te = new Date(t.fin+'T00:00:00');
    const left = Math.max(0,(ts-C2S)/totalMs*100);
    const width = Math.max(1,(te-ts)/totalMs*100);
    const sm = getSemaforo(t);
    const weekLines = ticks.filter(tk=>tk.type==='week').map(tk=>
      `<div class="gweek-line" style="left:${tk.pct.toFixed(1)}%"></div>`).join('');
    const weekLabels = ticks.filter(tk=>tk.type==='week').map(tk=>
      `<div class="gweek-tick" style="left:${tk.pct.toFixed(1)}%">${tk.label}</div>`).join('');
    const monthLabels = ticks.filter(tk=>tk.type==='month').map(tk=>
      `<div class="gmonth-hdr" style="left:${tk.pct.toFixed(1)}%;color:${tk.color}">${tk.label}</div>`).join('');
    return `<div class="gtrack" style="margin-top:28px">
      ${monthLabels}${weekLabels}${weekLines}
      <div class="gbar" style="left:${left.toFixed(1)}%;width:${width.toFixed(1)}%;background:${sc.color}33;border-radius:4px"></div>
      <div class="gbar" style="left:${left.toFixed(1)}%;width:${(width*pct/100).toFixed(1)}%;background:${sc.color};border-radius:4px"></div>
    </div>`;
  };

  let rows = '';
  projOrder.forEach(pid => {
    const p = projById(pid);
    const pt = byProj[pid];
    const wp = pt.reduce((a,t)=>a+t.weight,0)||1;
    const avg = Math.round(pt.reduce((a,t)=>a+(t.pct*t.weight),0)/wp);
    rows += `<tr class="gantt-proj-row">
      <td colspan="2"><div class="gproj-name"><div style="width:10px;height:10px;border-radius:50%;background:${p.color}"></div>${p.name}</div></td>
      <td>${trackHTML({ini:'2026-05-04',fin:'2026-08-31',pct:avg,status:'En Progreso',weight:100})}</td>
      <td class="gpct">${avg}%</td>
      <td><span style="font-size:11px;font-weight:600;color:${p.color}">${pt.length} hitos</span></td>
      <td></td>
    </tr>`;
    pt.forEach(t => {
      const sm = getSemaforo(t);
      rows += `<tr class="gantt-hito-row" style="cursor:pointer" onclick="openEditHito(${t.id})">
        <td style="padding-left:24px"><div class="gname" title="${t.name}">↳ ${t.name}</div></td>
        <td>${statusPill(t.status)}</td>
        <td style="padding:4px 10px">${trackHTML(t)}</td>
        <td class="gpct">${t.status==='Completado'?100:t.pct}%</td>
        <td><span style="font-size:10px;color:var(--text3)">${fmtDate(t.ini)} – ${fmtDate(t.fin)}</span></td>
        <td class="gsemaforo" title="${sm.label}">${sm.icon}</td>
      </tr>`;
    });
  });

  document.getElementById('view-gantt').innerHTML =
    `<div class="sec-hdr"><h2>Cronograma C2 — May a Ago 2026</h2></div>
    <div class="gantt-wrap"><div class="gantt-inner">
    <table class="gantt-table">
      <thead><tr>
        <th style="width:190px">Hito</th>
        <th style="width:110px">Estado</th>
        <th>Cronograma (semanas)</th>
        <th style="width:36px">%</th>
        <th style="width:120px">Fechas</th>
        <th style="width:28px">⚑</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table></div></div>`;
}

  });

  destroyChart('mensual');
  let acc=0;
  chartInstances['mensual'] = new Chart(document.getElementById('ch-mensual'),{
    type:'bar',
    data:{
      labels:monthData.map(m=>m.label),
      datasets:[
        {type:'bar',label:'Avance mensual %',data:monthData.map(m=>m.pct),backgroundColor:monthData.map(m=>m.color+'55'),borderColor:monthData.map(m=>m.color),borderWidth:2,borderRadius:6},
        {type:'line',label:'Acumulado estimado',data:monthData.map(m=>{acc=Math.max(acc,m.pct);return acc;}),borderColor:'#E85F1E',borderWidth:2.5,pointBackgroundColor:'#E85F1E',pointRadius:5,fill:false,tension:.3,yAxisID:'y'}
      ]
    },
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{font:{size:10,family:'DM Sans'}}}},scales:{y:{min:0,max:100,ticks:{callback:v=>v+'%',font:{size:10}}}}}

  destroyChart('tiempo');

  const porV = f.filter(t=>{const fe=new Date(t.fin+'T00:00:00');const d=Math.ceil((fe-TODAY)/86400000);return d>=0&&d<=WARN_DAYS&&t.status!=='Completado';}).length;
  const ok = f.filter(t=>t.status==='Completado').length;
  const resto = f.length - venc - porV - ok;
  chartInstances['tiempo'] = new Chart(document.getElementById('ch-tiempo'),{
    type:'doughnut',
    data:{labels:['Completados','En tiempo','Por vencer','Vencidos'],datasets:[{data:[ok,Math.max(0,resto),porV,venc],backgroundColor:['#E8F7F2','#EAF1FC','#FEF3E5','#FDECEB'],borderColor:['#0A7C55','#1563BB','#B05800','#C0392B'],borderWidth:2}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font:{size:10,family:'DM Sans'},padding:6,boxWidth:10}}}}
  });
}

// ─── POR PROYECTO ─────────────────────────────────────────
function renderPorProyecto() {
  const f = getFiltered();
  document.getElementById('view-proyectos').innerHTML =
    `<div class="sec-hdr"><h2>Detalle por proyecto</h2></div><div class="proj-grid">` +
    projects.map(p => {
      const pt = f.filter(t=>t.proj===p.id);
      if(!pt.length) return '';
      const wp = pt.reduce((a,t)=>a+t.weight,0)||1;
      const avg = Math.round(pt.reduce((a,t)=>a+(t.pct*t.weight),0)/wp);
      const comp = pt.filter(t=>t.status==='Completado').length;
      const prog = pt.filter(t=>t.status==='En Progreso').length;
      const bloq = pt.filter(t=>t.status==='Bloqueado').length;

      // Calcular cumplimiento: hitos con fin cumplido o completados a tiempo
      const total = pt.length;
      const vencidos = pt.filter(t=>{const fe=new Date(t.fin+'T00:00:00');return fe<TODAY&&t.status!=='Completado';}).length;
      const cumplPct = total>0 ? Math.round(((total-vencidos)/total)*100) : 100;

      let cardBg='#FFFFFF', cardBorder=`1.5px solid var(--border)`, cumplColor='var(--green)', cumplBg='var(--green-bg)';
      if(cumplPct>=95){ cardBg='#F0FBF6'; cardBorder='2px solid #0A7C55'; cumplColor='#0A7C55'; cumplBg='#D4F0E4';}
      else if(cumplPct>=90){ cardBg='#FEF9F0'; cardBorder='2px solid #B05800'; cumplColor='#B05800'; cumplBg='#FAEEDA';}
      else { cardBg='#FDF2F2'; cardBorder='2px solid #C0392B'; cumplColor='#C0392B'; cumplBg='#FDECEB';}

      return `<div class="proj-card" style="background:${cardBg};border:${cardBorder}">
        <div class="proj-card-hdr">
          <div>
            <div class="proj-name">${p.name}</div>
            <div style="font-size:11px;color:var(--text3);margin-top:2px">${pt.length} hitos</div>
            <span class="proj-cumpl-badge" style="background:${cumplBg};color:${cumplColor}">Cumplimiento: ${cumplPct}%</span>
          </div>
          <div class="proj-pct" style="color:${p.color}">${avg}%</div>
        </div>
        <div class="proj-bar-wrap"><div class="proj-bar-fill" style="width:${avg}%;background:${p.color}"></div></div>
        <div class="proj-stats">
          ${comp?`<span class="proj-stat" style="background:var(--green-bg);color:var(--green)">${comp} completados</span>`:''}
          ${prog?`<span class="proj-stat" style="background:var(--blue-bg);color:var(--blue)">${prog} en progreso</span>`:''}
          ${bloq?`<span class="proj-stat" style="background:var(--red-bg);color:var(--red)">${bloq} bloqueados</span>`:''}
        </div>
        <div class="proj-hitos">
          ${pt.map(t=>{
            const sc=STATUS_CFG[t.status], sm=getSemaforo(t);
            return`<div class="proj-hito-row" onclick="openEditHito(${t.id})">
              <span>${sm.icon} <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:200px">${t.name}</span></span>
              <span style="display:flex;gap:5px;align-items:center;flex-shrink:0;margin-left:6px">
                <span style="font-size:10px;color:var(--text3)">${t.weight}%</span>
                <span class="gstatus-pill" style="background:${sc.bg};color:${sc.color};font-size:9px;padding:1px 6px">${t.status.split(' ')[0]}</span>
              </span>
            </div>`;
          }).join('')}
        </div>
      </div>`;
    }).join('') + `</div>`;
}

// ─── MODAL EDIT ──────────────────────────────────────────
function toggleBloqField(val) {
  document.getElementById('bloq-field').classList.toggle('show', val==='Bloqueado');
}

function openEditHito(id) {
  const t=tasks.find(x=>x.id===id); if(!t) return;
  const p=projById(t.proj);
  document.getElementById('mh-id').value=id;
  document.getElementById('mh-title').textContent=t.name;
  document.getElementById('mh-proj-label').textContent=p.name;
  document.getElementById('mh-name').value=t.name;
  document.getElementById('mh-ini').value=t.ini;
  document.getElementById('mh-fin').value=t.fin;
  document.getElementById('mh-status').value=t.status;
  document.getElementById('mh-weight').value=t.weight;
  document.getElementById('mh-pct').value=t.pct;
  document.getElementById('mh-notes').value=t.notes||'';
  document.getElementById('mh-bloq').value=t.bloq_reason||'';
  toggleBloqField(t.status);
  document.getElementById('modal-hito-overlay').classList.add('open');
}

function closeModalHito(e) {
  if(!e||e.target===document.getElementById('modal-hito-overlay'))
    document.getElementById('modal-hito-overlay').classList.remove('open');
}

async function saveHito() {
  const id=parseInt(document.getElementById('mh-id').value);
  const btn=document.getElementById('mh-save-btn');
  btn.disabled=true; btn.textContent='Guardando...';
  const status=document.getElementById('mh-status').value;
  let pct=Math.max(0,Math.min(100,parseInt(document.getElementById('mh-pct').value)||0));
  if(status==='Completado') pct=100;
  const payload={
    name:document.getElementById('mh-name').value,
    ini:document.getElementById('mh-ini').value,
    fin:document.getElementById('mh-fin').value,
    status, weight:parseInt(document.getElementById('mh-weight').value)||10,
    pct, notes:document.getElementById('mh-notes').value,
    bloq_reason:status==='Bloqueado'?document.getElementById('mh-bloq').value:'',
  };
  setSyncing(true);
  const {error}=await db.from('tasks').update(payload).eq('id',id);
  setSyncing(false); btn.disabled=false; btn.textContent='Guardar';
  if(error){showToast('Error: '+error.message,true);return;}
  document.getElementById('modal-hito-overlay').classList.remove('open');
  showToast('Hito guardado en la nube ✓');
  await loadAll();
}

async function deleteHito() {
  const id=parseInt(document.getElementById('mh-id').value);
  if(!confirm('¿Eliminar este hito?')) return;
  setSyncing(true);
  const {error}=await db.from('tasks').delete().eq('id',id);
  setSyncing(false);
  if(error){showToast('Error: '+error.message,true);return;}
  document.getElementById('modal-hito-overlay').classList.remove('open');
  showToast('Hito eliminado'); await loadAll();
}

function openAddHito(){document.getElementById('ah-proj').innerHTML=projects.map(p=>`<option value="${p.id}">${p.name}</option>`).join('');document.getElementById('modal-add-hito-overlay').classList.add('open');}
function closeAddHito(){document.getElementById('modal-add-hito-overlay').classList.remove('open');}

async function saveAddHito(){
  const name=document.getElementById('ah-name').value.trim();
  if(!name){alert('El nombre es obligatorio');return;}
  const btn=document.getElementById('ah-save-btn'); btn.disabled=true; btn.textContent='Guardando...';
  const payload={proj:document.getElementById('ah-proj').value,name,ini:document.getElementById('ah-ini').value,fin:document.getElementById('ah-fin').value,status:document.getElementById('ah-status').value,weight:parseInt(document.getElementById('ah-weight').value)||10,pct:0,notes:'',bloq_reason:''};
  setSyncing(true);
  const {error}=await db.from('tasks').insert(payload);
  setSyncing(false); btn.disabled=false; btn.textContent='Agregar';
  if(error){showToast('Error: '+error.message,true);return;}
  closeAddHito(); showToast('Hito agregado ✓'); await loadAll();
}

function openAddProject(){document.getElementById('modal-add-proj-overlay').classList.add('open');}
function closeAddProject(){document.getElementById('modal-add-proj-overlay').classList.remove('open');}

async function saveAddProject(){
  const name=document.getElementById('ap-name').value.trim(), rawId=document.getElementById('ap-id').value.trim().replace(/\s+/g,'_').toLowerCase();
  if(!name||!rawId){alert('Nombre e ID son obligatorios');return;}
  const btn=document.getElementById('ap-save-btn'); btn.disabled=true; btn.textContent='Creando...';
  setSyncing(true);
  const {error}=await db.from('projects').insert({id:rawId,name,color:document.getElementById('ap-color').value});
  setSyncing(false); btn.disabled=false; btn.textContent='Crear proyecto';
  if(error){showToast('Error: '+error.message,true);return;}
  closeAddProject(); showToast('Proyecto creado ✓'); await loadAll();
}

// ─── VIEW CONTROL ─────────────────────────────────────────
function setView(v,el){
  currentView=v;
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  ['kanban','gantt','graficos','proyectos'].forEach(id=>{
    document.getElementById('view-'+id).classList.toggle('hidden',id!==v);
  });
  renderCurrentView();
}

function renderCurrentView(){
  renderMetrics();
  renderMonthProgress();
  if(currentView==='kanban') renderKanban();
  else if(currentView==='gantt') renderGantt();
  else if(currentView==='graficos') renderGraficos();
  else if(currentView==='proyectos') renderPorProyecto();
}

function renderAll(){
  renderMetrics();
  renderMonthProgress();
  renderKanban();
  if(currentView==='gantt') renderGantt();
  else if(currentView==='graficos') renderGraficos();
  else if(currentView==='proyectos') renderPorProyecto();
}

function showToast(msg,isError=false){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='toast'+(isError?' error':'');
  t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2500);
}

subscribeRealtime();
